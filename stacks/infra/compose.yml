services:

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --log.level=INFO
      - --accesslog=true
      - --ping.entrypoint=web
      # comment out these two lines to stop redirecting HTTP to HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --providers.file.filename=/etc/traefik/dynamic.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

      # config from repo (immutable)
      - /opt/stacks-repo/stacks/infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

      # cert material from data (stateful)
      - /opt/data/traefik/cert.pem:/etc/traefik/cert.pem:ro
      - /opt/data/traefik/key.pem:/etc/traefik/key.pem:ro
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`traefik.home`)
      - traefik.http.routers.traefik.middlewares=secured@file
      #- traefik.http.routers.traefik.entrypoints=web # only web, no websecure
      - "traefik.http.routers.traefik.entrypoints=websecure"  # listen on 443
      - "traefik.http.routers.traefik.tls=true"               # enable TLS
      - traefik.http.routers.traefik.service=api@internal

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.dozzle.rule=Host(`dozzle.home`)
      - traefik.http.routers.dozzle.middlewares=secured@file
      #- traefik.http.routers.dozzle.entrypoints=web # only web, no websecure
      - traefik.http.routers.dozzle.tls=true  # disable TLS for this router
      - traefik.http.routers.dozzle.entrypoints=websecure # disable websecure entrypoint
      - traefik.http.services.dozzle.loadbalancer.server.port=8080

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/data/portainer:/data
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - traefik.http.routers.portainer.rule=Host(`portainer.home`)
      - traefik.http.routers.portainer.middlewares=secured@file
      - traefik.http.routers.portainer.entrypoints=websecure
      - traefik.http.routers.portainer.tls=true
      - traefik.http.services.portainer.loadbalancer.server.port=9000

networks:
  edge:
    external: true